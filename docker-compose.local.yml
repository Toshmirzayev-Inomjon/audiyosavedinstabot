services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:?TELEGRAM_API_ID is required}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:?TELEGRAM_API_HASH is required}
      TELEGRAM_LOCAL: "1"
      TELEGRAM_VERBOSITY: "1"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api

  bot:
    environment:
      BOT_API_BASE: http://telegram-bot-api:8081
      BOT_API_LOCAL: "true"
      MAX_DOWNLOAD_MB: "1990"
    depends_on:
      - telegram-bot-api
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api:ro

volumes:
  telegram-bot-api-data:
