services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: media_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d media_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "bot.main"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/media_bot
      REDIS_URL: redis://redis:6379/0
      STORAGE_DIR: /app/tmp/superapp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./tmp:/app/tmp
    ports:
      - "${BOT_PORT:-8080}:8080"

  worker:
    build: .
    restart: unless-stopped
    command:
      [
        "celery",
        "-A",
        "bot.tasks.celery_app.celery_app",
        "worker",
        "--loglevel=INFO",
        "--concurrency=${WORKER_CONCURRENCY:-2}",
      ]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/media_bot
      REDIS_URL: redis://redis:6379/0
      STORAGE_DIR: /app/tmp/superapp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./tmp:/app/tmp

volumes:
  postgres-data:
  redis-data:
